<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>AirSense Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container-fluid">

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark mt-3 glass">

        <div class="container-fluid">

            <a class="navbar-brand fw-bold fs-3">

                🌍 AirSense Dashboard

            </a>

            <button class="btn btn-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#predictModal">

                <i class="fa-solid fa-wand-magic-sparkles"></i>

                Future AQI Prediction

            </button>

        </div>

    </nav>


    <!-- Cards -->

    <div class="row mt-4">

        <div class="col-lg-3">

            <div class="card dashboard-card">

                <i class="fa-solid fa-smog icon"></i>

                <h5>Average AQI</h5>

                <h2 class="counter">{{average_aqi}}</h2>

            </div>

        </div>

        <div class="col-lg-3">

            <div class="card dashboard-card">

                <i class="fa-solid fa-arrow-trend-up icon"></i>

                <h5>Maximum AQI</h5>

                <h2 class="counter">{{maximum_aqi}}</h2>

            </div>

        </div>

        <div class="col-lg-3">

            <div class="card dashboard-card">

                <i class="fa-solid fa-face-smile icon"></i>

                <h5>Good Days</h5>

                <h2 class="counter">{{good_days}}</h2>

            </div>

        </div>

        <div class="col-lg-3">

            <div class="card dashboard-card">

                <i class="fa-solid fa-triangle-exclamation icon"></i>

                <h5>Poor Days</h5>

                <h2 class="counter" >{{poor_days}}</h2>

            </div>

        </div>

    </div>

    <!-- Graph Row 1 -->

    <div class="row mt-4">

        <div class="col-lg-6">

            <div class="graph-card">

                <h4>AQI Trend</h4>

                <canvas id="aqiTrend"></canvas>

            </div>

        </div>

        <div class="col-lg-6">

            <div class="graph-card">

                <h4>Pollutant Levels</h4>

                <canvas id="pollutionChart"></canvas>

            </div>

        </div>

    </div>

    <!-- Graph Row 2 -->

    <div class="row mt-4">

        <div class="col-lg-6">

            <div class="graph-card">

                <h4>AQI Categories</h4>

                <canvas id="pieChart"></canvas>

            </div>

        </div>

        <div class="col-lg-6">

            <div class="graph-card">

                <h4>Feature Importance</h4>

                <canvas id="importanceChart"></canvas>

            </div>

        </div>

    </div>

</div>


<!-- Prediction Modal -->

<div class="modal fade"
     id="predictModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h4>Future AQI Prediction</h4>

<button class="btn-close"
data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<div class="row">

<div class="col-md-6">

<input id="pm25" class="form-control mb-3" placeholder="PM2.5">

<input id="pm10" class="form-control mb-3" placeholder="PM10">

<input id="no" class="form-control mb-3" placeholder="NO2">

<input id="so" class="form-control mb-3" placeholder="SO2">

</div>

<div class="col-md-6">

<input id="co" class="form-control mb-3" placeholder="CO">

<input id="o" class="form-control mb-3" placeholder="O3">

<input id="temp" class="form-control mb-3" placeholder="Temperature">

<input id="humidity" class="form-control mb-3" placeholder="Humidity">

</div>

</div>

<div class="text-center">

<button
class="btn btn-success btn-lg"
id="predictButton">

Predict AQI

</button>

</div>

<div class="text-center mt-3">

<div id="loading" style="display:none;">

<div class="spinner-border text-info">

</div>

<p class="mt-2">

Predicting...

</p>

</div>

</div>

<hr>

<div class="mt-4 text-center">

    <div class="card bg-dark text-white p-4 rounded-4">

        <h2 id="prediction"></h2>

        <h4 id="category"></h4>

        <p id="advice"></p>

    </div>

</div>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="{{ url_for('static',
filename='js/charts.js') }}"></script>

<script src="{{ url_for('static',
filename='js/predict.js') }}"></script>

<script src="{{url_for('static',
filename='js/counter.js')}}"></script>

</body>

</html>
